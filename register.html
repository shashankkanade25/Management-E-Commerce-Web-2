<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCart | Create Account</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-layer-group"></i> <span>ForgeCart</span>
        </a>
    </nav>

    <div class="container auth-wrapper">
        <div class="glass auth-container">
            <h2>Initiate Access</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" id="email" class="form-control" placeholder="developer@backforge.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a secure password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Verify password" required>
                </div>
                <div id="register-error" style="color:#ff6b6b; font-size:0.9rem; margin-top:10px; display:none;"></div>
                <button type="submit" class="btn btn-block" style="margin-top: 15px;" id="register-btn">
                    <i class="fas fa-user-plus"></i> Initialize Account
                </button>
            </form>
            <p>Already registered? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-layer-group"></i> ForgeCart
                <span>· BackForge 2026</span>
            </div>
            <div class="footer-links">
                <a href="index.html">Store</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="login.html">Account</a>
            </div>
            <div class="footer-copy">
                Built for the BackForge Hackathon · Designed with precision
            </div>
        </div>
    </footer>

    <script src="js/shared.js"></script>
    <script>
    // If user is already logged in, redirect to home
    const existingUser = getUser();
    if (existingUser) { window.location.href = 'index.html'; }

    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirm_password').value.trim();
        const errorEl = document.getElementById('register-error');
        const btn = document.getElementById('register-btn');

        if (!name || !email || !password || !confirmPassword) {
            errorEl.textContent = 'Please fill in all fields.';
            errorEl.style.display = 'block';
            return;
        }

        if (password !== confirmPassword) {
            errorEl.textContent = 'Passwords do not match.';
            errorEl.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorEl.textContent = 'Password must be at least 6 characters.';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
        errorEl.style.display = 'none';

        try {
            const res = await fetch(`${API}/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();

            if (res.ok && data.token) {
                localStorage.setItem('forgeUser', JSON.stringify(data));
                showToast('Account created! Welcome, ' + data.name + '!', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                errorEl.textContent = data.message || 'Registration failed.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Initialize Account';
            }
        } catch (err) {
            errorEl.textContent = 'Server error. Make sure backend is running.';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Initialize Account';
            console.error('Register error:', err);
        }
    });
    </script>
</body>
</html>
