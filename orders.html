<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCart | Execution History</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ── Order Tracking Timeline ─────────────────────────────────────── */
        .timeline { display:flex; flex-direction:column; gap:0; margin:24px 0; }
        .timeline-step {
            display:flex; align-items:flex-start; gap:16px; position:relative;
        }
        .timeline-step:not(:last-child)::after {
            content:''; position:absolute; left:19px; top:42px;
            width:2px; height:calc(100% - 8px);
            background:var(--card-border);
            z-index:0;
        }
        .timeline-step.done:not(:last-child)::after { background:var(--primary); }
        .timeline-icon {
            width:40px; height:40px; border-radius:50%; display:flex;
            align-items:center; justify-content:center; flex-shrink:0;
            border:2px solid var(--card-border); background:var(--bg-card);
            font-size:0.95rem; z-index:1; position:relative;
            transition:all 0.3s;
        }
        .timeline-step.done .timeline-icon {
            border-color:var(--primary); background:rgba(0,230,118,0.12);
            color:var(--primary);
        }
        .timeline-step.current .timeline-icon {
            border-color:var(--warning,#f0ad4e); background:rgba(240,173,78,0.12);
            color:var(--warning,#f0ad4e); animation:pulse 1.5s infinite;
        }
        .timeline-step.cancelled .timeline-icon {
            border-color:#ff6b6b; background:rgba(255,107,107,0.12);
            color:#ff6b6b;
        }
        .timeline-body { padding:8px 0 24px; }
        .timeline-title { font-weight:700; color:var(--text-bright); font-size:0.95rem; }
        .timeline-ts { font-size:0.78rem; color:var(--text-muted); margin-top:2px; font-family:'JetBrains Mono',monospace; }
        .timeline-desc { font-size:0.82rem; color:var(--text-dim); margin-top:4px; }
        @keyframes pulse {
            0%,100%{ box-shadow:0 0 0 0 rgba(240,173,78,0.4); }
            50%{ box-shadow:0 0 0 8px rgba(240,173,78,0); }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-brand"><i class="fas fa-layer-group"></i> <span>ForgeCart</span></a>
        <div class="nav-links">
            <a href="admin.html" class="nav-link nav-admin-link" id="nav-admin-link" style="margin-right:15px;display:none;"><i class="fas fa-tachometer-alt"></i></a>
            <a href="orders.html" class="nav-link" style="margin-right:15px;"><i class="fas fa-box-open"></i></a>
            <a href="cart.html" class="nav-link nav-cart-wrapper" style="margin-right:15px;">
                <i class="fas fa-shopping-cart"></i>
                <span class="nav-cart-badge" id="cart-badge-count" style="display:none;">0</span>
            </a>
            <a href="login.html" class="nav-link" id="nav-signin">Sign In</a>
            <a href="register.html" class="btn" id="nav-signup">Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Execution Logs</h1>
        </div>
        <div id="order-history-container" style="margin-top:30px;">
            <p style="color:var(--text-muted);text-align:center;padding:40px 0;">Loading order history...</p>
        </div>
    </div>

    <!-- Order Detail + Tracking Timeline Modal -->
    <div id="order-modal" class="modal-overlay" style="display:none;">
        <div class="glass modal-content position-relative" style="max-width:620px;">
            <button class="modal-close" onclick="closeOrderModal()"><i class="fas fa-times"></i></button>
            <div id="order-modal-body"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand"><i class="fas fa-layer-group"></i> ForgeCart <span>· BackForge 2026</span></div>
            <div class="footer-links">
                <a href="index.html">Store</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="login.html">Account</a>
            </div>
            <div class="footer-copy">Built for the BackForge Hackathon</div>
        </div>
    </footer>

    <script src="js/shared.js"></script>
    <script>
    let allOrders = [];

    function formatDateTime(d) {
        if (!d) return '—';
        return new Date(d).toLocaleString('en-US', {
            month:'short', day:'numeric', year:'numeric',
            hour:'2-digit', minute:'2-digit'
        });
    }

    // ── Tracking Timeline Builder ──────────────────────────────────────────
    function buildTimeline(order) {
        const ts = order.statusTimestamps || {};
        const isCancelled = order.orderStatus === 'cancelled';

        const steps = [
            {
                key:   'pending',
                icon:  'fa-shopping-bag',
                title: 'Order Placed',
                ts:    ts.pendingAt,
                desc:  `Order ID: ${order.orderId || order._id.slice(-8).toUpperCase()}`
            },
            {
                key:   'shipped',
                icon:  'fa-shipping-fast',
                title: 'Shipped',
                ts:    ts.shippedAt,
                desc:  'Package dispatched to your location'
            },
            {
                key:   'delivered',
                icon:  'fa-check-circle',
                title: 'Delivered',
                ts:    ts.deliveredAt,
                desc:  'Package received successfully'
            }
        ];

        const statuses = ['pending', 'shipped', 'delivered'];
        const currentIdx = statuses.indexOf(order.orderStatus);

        if (isCancelled) {
            return `
            <div class="timeline">
                ${steps[0] ? `
                <div class="timeline-step done">
                    <div class="timeline-icon"><i class="fas fa-shopping-bag"></i></div>
                    <div class="timeline-body">
                        <div class="timeline-title">Order Placed</div>
                        <div class="timeline-ts">${formatDateTime(ts.pendingAt)}</div>
                    </div>
                </div>` : ''}
                <div class="timeline-step cancelled">
                    <div class="timeline-icon"><i class="fas fa-times-circle"></i></div>
                    <div class="timeline-body">
                        <div class="timeline-title">Order Cancelled</div>
                        <div class="timeline-ts">${formatDateTime(ts.cancelledAt)}</div>
                        <div class="timeline-desc">This order was cancelled</div>
                    </div>
                </div>
            </div>`;
        }

        return `
        <div class="timeline">
            ${steps.map((step, idx) => {
                const done    = idx < currentIdx || (idx === currentIdx && order.orderStatus === 'delivered');
                const current = idx === currentIdx && order.orderStatus !== 'delivered';
                const cls     = done ? 'done' : current ? 'current' : '';
                return `
                <div class="timeline-step ${cls}">
                    <div class="timeline-icon">
                        <i class="fas ${done ? 'fa-check' : step.icon}"></i>
                    </div>
                    <div class="timeline-body">
                        <div class="timeline-title">${step.title}</div>
                        <div class="timeline-ts">${step.ts ? formatDateTime(step.ts) : (current ? 'In progress...' : 'Pending')}</div>
                        ${step.desc ? `<div class="timeline-desc">${step.desc}</div>` : ''}
                    </div>
                </div>`;
            }).join('')}
        </div>`;
    }

    // ── Show order detail modal ────────────────────────────────────────────
    function showOrderDetail(orderId) {
        const order = allOrders.find(o => o._id === orderId);
        if (!order) return;

        const modal = document.getElementById('order-modal');
        const body  = document.getElementById('order-modal-body');

        body.innerHTML = `
            <h3 style="margin-bottom:4px;font-family:'Outfit',sans-serif;font-size:1.3rem;color:var(--text-bright);">
                <i class="fas fa-receipt" style="color:var(--primary);margin-right:8px;"></i>Order Details
            </h3>
            <p style="color:var(--text-dim);font-size:0.82rem;margin-bottom:6px;">
                ID: <span style="font-family:'JetBrains Mono',monospace;">${order.orderId || order._id}</span>
            </p>

            <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
                <div style="flex:1;min-width:120px;">
                    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px;">Date</div>
                    <div style="color:var(--text-main);font-weight:500;">${formatDateTime(order.createdAt)}</div>
                </div>
                <div style="flex:1;min-width:120px;">
                    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px;">Status</div>
                    ${getStatusBadge(order.orderStatus)}
                </div>
                <div style="flex:1;min-width:120px;">
                    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px;">Payment</div>
                    <div style="color:var(--success);font-weight:600;font-size:0.9rem;">
                        <i class="fas fa-check-circle" style="margin-right:4px;"></i>${order.paymentStatus}
                    </div>
                </div>
            </div>

            <h4 style="font-size:0.82rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--primary);margin-bottom:8px;">
                <i class="fas fa-route"></i> Tracking Timeline
            </h4>
            ${buildTimeline(order)}

            <h4 style="font-size:0.82rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:12px;">Items</h4>
            <div style="margin-bottom:20px;">
                ${order.items.map(item => `
                <div class="order-detail-item">
                    <img src="${item.image}" alt="${item.name}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;">
                    <div>
                        <div style="color:var(--text-main);font-weight:600;">${item.name}</div>
                        <div style="font-size:0.8rem;color:var(--text-dim);">$${item.price.toFixed(2)} × ${item.quantity}</div>
                    </div>
                    <div style="font-weight:700;color:var(--primary);">$${(item.price * item.quantity).toFixed(2)}</div>
                </div>`).join('')}
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px dashed var(--card-border);">
                <span style="font-size:1.1rem;font-weight:700;color:var(--text-bright);font-family:'Outfit',sans-serif;">Total</span>
                <span style="font-size:1.4rem;font-weight:800;color:var(--primary);font-family:'Outfit',sans-serif;">$${order.total.toFixed(2)}</span>
            </div>
        `;

        modal.style.display = 'flex';
    }

    function closeOrderModal() {
        document.getElementById('order-modal').style.display = 'none';
    }

    document.getElementById('order-modal').addEventListener('click', function(e) {
        if (e.target === this) closeOrderModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOrderModal(); });

    // ── Load orders from API ───────────────────────────────────────────────
    async function loadOrders() {
        const user      = getUser();
        const container = document.getElementById('order-history-container');

        if (!user) {
            container.innerHTML = `
                <div style="text-align:center;padding:60px 0;color:var(--text-muted);">
                    <i class="fas fa-lock" style="font-size:3rem;margin-bottom:15px;opacity:0.3;"></i>
                    <p>Please sign in to view your order history.</p>
                    <a href="login.html" class="btn" style="margin-top:20px;display:inline-block;">Sign In</a>
                </div>`;
            return;
        }

        try {
            const res    = await apiFetch(`${API}/orders/my`, { headers: authHeaders() });
            const body   = await res.json();
            const orders = (body.data && body.data.orders) ? body.data.orders : [];
            allOrders    = orders;

            if (!orders.length) {
                container.innerHTML = `
                    <div style="text-align:center;padding:60px 0;color:var(--text-muted);">
                        <i class="fas fa-box-open" style="font-size:3rem;margin-bottom:15px;opacity:0.3;"></i>
                        <p>No execution logs found yet.</p>
                        <a href="index.html" class="btn" style="margin-top:20px;display:inline-block;">Start Shopping</a>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="glass" style="margin-top:0;">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(order => `
                            <tr data-clickable onclick="showOrderDetail('${order._id}')" title="Click for tracking details" style="cursor:pointer;">
                                <td style="font-family:monospace;font-size:0.95rem;color:var(--primary);">
                                    <strong>${order.orderId || order._id.slice(-8).toUpperCase()}</strong>
                                </td>
                                <td style="color:var(--text-muted);">${new Date(order.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
                                <td><span style="background:rgba(255,255,255,0.05);padding:5px 10px;border-radius:20px;font-size:0.85rem;">${order.items.length} item(s)</span></td>
                                <td style="color:var(--primary);font-weight:700;">$${order.total.toFixed(2)}</td>
                                <td>${getStatusBadge(order.orderStatus)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;

        } catch (err) {
            if (err.message !== 'Session expired') {
                container.innerHTML = '<p style="color:#ff6b6b;text-align:center;padding:40px 0;">Failed to load orders. Is the server running?</p>';
            }
        }
    }

    loadOrders();
    </script>
</body>
</html>
