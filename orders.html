<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCart | Execution History</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-layer-group"></i> <span>ForgeCart</span>
        </a>
        <div class="nav-links">
            <a href="admin.html" class="nav-link nav-admin-link" id="nav-admin-link" style="margin-right: 15px;" title="Admin Dashboard"><i class="fas fa-tachometer-alt"></i></a>
            <a href="orders.html" class="nav-link" style="margin-right: 15px;" title="Order History"><i class="fas fa-box-open"></i></a>
            <a href="cart.html" class="nav-link nav-cart-wrapper" style="margin-right: 15px;" title="View Cart">
                <i class="fas fa-shopping-cart"></i>
                <span class="nav-cart-badge" id="cart-badge-count" style="display:none;">0</span>
            </a>
            <a href="login.html" class="nav-link" id="nav-signin">Sign In</a>
            <a href="register.html" class="btn" id="nav-signup">Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Execution Logs</h1>
        </div>
        <div id="order-history-container" style="margin-top: 30px;">
            <p style="color:var(--text-muted); text-align:center; padding:40px 0;">Loading order history...</p>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="modal-overlay" style="display:none;">
        <div class="glass modal-content position-relative">
            <button class="modal-close" onclick="closeOrderModal()"><i class="fas fa-times"></i></button>
            <div id="order-modal-body"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-layer-group"></i> ForgeCart
                <span>· BackForge 2026</span>
            </div>
            <div class="footer-links">
                <a href="index.html">Store</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="login.html">Account</a>
            </div>
            <div class="footer-copy">
                Built for the BackForge Hackathon · Designed with precision
            </div>
        </div>
    </footer>

    <script src="js/shared.js"></script>
    <script>
    let allOrders = [];

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatDateTime(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getStatusBadge(order) {
        const statusMap = {
            'Processing': { icon: 'fa-clock', color: 'var(--warning, #f0ad4e)' },
            'Shipped': { icon: 'fa-shipping-fast', color: 'var(--info, #5bc0de)' },
            'Delivered': { icon: 'fa-check-circle', color: 'var(--success, #00e676)' },
            'Cancelled': { icon: 'fa-times-circle', color: '#ff6b6b' }
        };
        const s = statusMap[order.orderStatus] || statusMap['Processing'];
        return `<span class="status-badge" style="color:${s.color}"><i class="fas ${s.icon}"></i> ${order.orderStatus}</span>`;
    }

    function showOrderDetail(orderId) {
        const order = allOrders.find(o => o._id === orderId);
        if (!order) return;

        const modal = document.getElementById('order-modal');
        const body = document.getElementById('order-modal-body');

        body.innerHTML = `
            <h3 style="margin-bottom:6px; font-family:'Outfit',sans-serif; font-size:1.3rem; color:var(--text-bright);">
                <i class="fas fa-receipt" style="color:var(--primary); margin-right:8px;"></i>Order Details
            </h3>
            <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:24px;">
                ID: <span style="font-family:'JetBrains Mono',monospace; color:var(--text-muted);">${order._id}</span>
            </p>

            <div style="display:flex; gap:20px; margin-bottom:24px; flex-wrap:wrap;">
                <div style="flex:1; min-width:120px;">
                    <div style="font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px;">Date</div>
                    <div style="color:var(--text-main); font-weight:500;">${formatDateTime(order.createdAt)}</div>
                </div>
                <div style="flex:1; min-width:120px;">
                    <div style="font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px;">Status</div>
                    <div>${getStatusBadge(order)}</div>
                </div>
                <div style="flex:1; min-width:120px;">
                    <div style="font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px;">Payment</div>
                    <div style="color:var(--success); font-weight:600; font-size:0.9rem;"><i class="fas fa-check-circle" style="margin-right:4px;"></i>${order.paymentStatus}</div>
                </div>
            </div>

            <h4 style="font-size:0.82rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); margin-bottom:12px; font-family:'Outfit',sans-serif;">Items</h4>
            <div style="margin-bottom:24px;">
                ${order.items.map(item => `
                    <div class="order-detail-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div>
                            <div class="item-name">${item.name}</div>
                            <div class="item-meta">$${item.price.toFixed(2)} × ${item.quantity}</div>
                        </div>
                        <div class="item-total">$${(item.price * item.quantity).toFixed(2)}</div>
                    </div>
                `).join('')}
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; padding-top:16px; border-top:1px dashed var(--card-border);">
                <span style="font-size:1.1rem; font-weight:700; color:var(--text-bright); font-family:'Outfit',sans-serif;">Total</span>
                <span style="font-size:1.4rem; font-weight:800; color:var(--primary); font-family:'Outfit',sans-serif;">$${order.total.toFixed(2)}</span>
            </div>
        `;

        modal.style.display = 'flex';
    }

    function closeOrderModal() {
        document.getElementById('order-modal').style.display = 'none';
    }

    // Close modal on overlay click
    document.getElementById('order-modal').addEventListener('click', function(e) {
        if (e.target === this) closeOrderModal();
    });

    // Close modal on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeOrderModal();
    });

    async function loadOrders() {
        const user = getUser();
        const container = document.getElementById('order-history-container');

        if (!user) {
            container.innerHTML = `
                <div style="text-align:center; padding:60px 0; color:var(--text-muted);">
                    <i class="fas fa-lock" style="font-size:3rem; margin-bottom:15px; opacity:0.3;"></i>
                    <p>Please sign in to view your order history.</p>
                    <a href="login.html" class="btn" style="margin-top:20px; display:inline-block;">Sign In</a>
                </div>`;
            return;
        }

        try {
            const res = await fetch(`${API}/orders/${user._id}`);
            const orders = await res.json();
            allOrders = orders;

            if (!orders || orders.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:60px 0; color:var(--text-muted);">
                        <i class="fas fa-box-open" style="font-size:3rem; margin-bottom:15px; opacity:0.3;"></i>
                        <p>No execution logs found yet.</p>
                        <a href="index.html" class="btn" style="margin-top:20px; display:inline-block;">Start Shopping</a>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="glass" style="margin-top: 0;">
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Timestamp</th>
                                <th>Assets</th>
                                <th>Total Resource</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(order => `
                                <tr data-clickable onclick="showOrderDetail('${order._id}')" title="Click to view details">
                                    <td style="font-family: monospace; font-size: 0.95rem; color: var(--text-main);"><strong>${order._id.slice(-8).toUpperCase()}</strong></td>
                                    <td style="color: var(--text-muted);">${formatDate(order.createdAt)}</td>
                                    <td><span style="background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 20px; font-size: 0.85rem;">${order.items.length} item(s)</span></td>
                                    <td style="color: var(--primary); font-weight:700;">$${order.total.toFixed(2)}</td>
                                    <td>${getStatusBadge(order)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        } catch (err) {
            container.innerHTML = '<p style="color:#ff6b6b;text-align:center;padding:40px 0;">Failed to load orders. Is the server running?</p>';
            console.error('Failed to load orders:', err);
        }
    }

    loadOrders();
    </script>
</body>
</html>
